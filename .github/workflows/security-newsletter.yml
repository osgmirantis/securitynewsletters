name: Product Security Newsletter

# Weekly on Monday 07:00 UTC (~09:00 Europe/Madrid). GitHub cron is always UTC.
# Plus a manual trigger that can override the window/channel or do a dry run.
on:
  schedule:
    - cron: "0 7 * * 1"
  workflow_dispatch:
    inputs:
      days:
        description: "Reporting window (days)"
        required: false
        default: "30"
      trend_weeks:
        description: "Weeks in the trend chart"
        required: false
        default: "12"
      dry_run:
        description: "Render the email but do not send it"
        type: boolean
        required: false
        default: false
      per_workspace:
        description: "Post one newsletter per workspace instead of one combined"
        type: boolean
        required: false
        default: false

# Don't let a manual run collide with the scheduled one.
concurrency:
  group: security-newsletter
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  newsletter:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Generate & send newsletter
        env:
          # ===================== Aikido credentials (per-workspace) =====================
          # You have 4 workspaces -> declare them in AIKIDO_WORKSPACES (JSON array,
          # one object per workspace). Simplest: a SECRET named AIKIDO_WORKSPACES
          # holding inline creds (see README §1). Add "all_teams":true to a workspace
          # whose teams don't use the Product: prefix (e.g. MOSK) to report them all.
          # It may be a Variable instead if you use "id_env"/"secret_env" refs. Secret wins.
          AIKIDO_WORKSPACES: ${{ secrets.AIKIDO_WORKSPACES || vars.AIKIDO_WORKSPACES }}
          AIKIDO_REGION: ${{ vars.AIKIDO_REGION || 'eu' }}
          WORKSPACE_NAME: ${{ vars.WORKSPACE_NAME }}
          # Single-workspace fallback (used only if AIKIDO_WORKSPACES is empty):
          AIKIDO_CLIENT_ID: ${{ secrets.AIK_ID_K0RDENT }}
          AIKIDO_CLIENT_SECRET: ${{ secrets.AIK_SECRET_K0RDENT }}
          # Granular alternative — AIKIDO_WORKSPACES as a VARIABLE with id_env/secret_env
          # refs, plus one secret pair per workspace mapped here (uncomment & extend):
          # AIK_ID_K0RDENT: ${{ secrets.AIK_ID_K0RDENT }}
          # AIK_SECRET_K0RDENT: ${{ secrets.AIK_SECRET_K0RDENT }}
          # AIK_ID_WS2: ${{ secrets.AIK_ID_WS2 }}
          # AIK_SECRET_WS2: ${{ secrets.AIK_SECRET_WS2 }}
          # AIK_ID_WS3: ${{ secrets.AIK_ID_WS3 }}
          # AIK_SECRET_WS3: ${{ secrets.AIK_SECRET_WS3 }}
          # AIK_ID_WS4: ${{ secrets.AIK_ID_WS4 }}
          # AIK_SECRET_WS4: ${{ secrets.AIK_SECRET_WS4 }}
          # ----- Email recipients & sender (Variables; addresses aren't secret) -----
          EMAIL_TO: ${{ vars.EMAIL_TO }}
          EMAIL_CC: ${{ vars.EMAIL_CC }}
          EMAIL_BCC: ${{ vars.EMAIL_BCC }}
          EMAIL_FROM: ${{ vars.EMAIL_FROM }}
          # ----- SMTP server (host/port/security as Variables; password as Secret) -----
          SMTP_HOST: ${{ vars.SMTP_HOST }}
          SMTP_PORT: ${{ vars.SMTP_PORT || '587' }}
          SMTP_SECURITY: ${{ vars.SMTP_SECURITY || 'starttls' }}
          SMTP_USERNAME: ${{ secrets.SMTP_USERNAME }}
          SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
          # ----- misc -----
          WORKSPACE_NAME: ${{ vars.WORKSPACE_NAME }}
          DAYS: ${{ github.event.inputs.days || '30' }}
          TREND_WEEKS: ${{ github.event.inputs.trend_weeks || '12' }}
          DRY_RUN: ${{ github.event.inputs.dry_run }}
          PER_WORKSPACE: ${{ github.event.inputs.per_workspace }}
        run: |
          set -euo pipefail
          ARGS=(--region "$AIKIDO_REGION" --days "$DAYS" \
                --trend-weeks "$TREND_WEEKS" --out ./out --save-json)
          [ "${PER_WORKSPACE:-false}" = "true" ] && ARGS+=(--per-workspace)
          if [ "${DRY_RUN:-false}" = "true" ]; then
            echo "::notice::Dry run — rendering HTML + .eml, not sending."
            ARGS+=(--dry-run)
          elif [ -n "${SMTP_HOST:-}" ] && [ -n "${EMAIL_TO:-}" ]; then
            echo "::notice::Emailing the newsletter to ${EMAIL_TO}."
          else
            echo "::error::No email target. Set SMTP_HOST + EMAIL_TO (and SMTP_PASSWORD)."
            exit 1
          fi
          python -m main "${ARGS[@]}"

      - name: Write run summary
        if: always()
        run: python scripts/job_summary.py out >> "$GITHUB_STEP_SUMMARY"

      - name: Archive charts & preview
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: newsletter-${{ github.run_id }}
          path: out/
          retention-days: 30
          if-no-files-found: ignore
